<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석체크 - 위즈피아올린음악학원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #C9A96E; --gold-dark: #8B6914; --cream: #FAF8F3;
    --dark: #1A1814; --dark2: #2D2A24; --dark3: #3E3A32;
    --mid: #6B6558; --green: #4CAF50; --red: #E53935;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--dark); color:var(--cream); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  .logo { width:180px; margin-bottom:32px; border-radius:6px; }
  .title { font-family:'Noto Serif KR',serif; font-size:24px; font-weight:300; color:var(--cream); margin-bottom:6px; letter-spacing:1px; }
  .subtitle { font-size:13px; color:var(--mid); margin-bottom:40px; letter-spacing:0.5px; }
  .gold-line { width:40px; height:2px; background:var(--gold); margin:0 auto 40px; }
  .card { background:var(--dark2); border:1px solid rgba(201,169,110,0.2); border-radius:8px; padding:40px; width:100%; max-width:480px; text-align:center; }
  .time-display { font-family:'Cormorant Garamond',serif; font-size:56px; font-weight:300; color:var(--gold); line-height:1; margin-bottom:8px; }
  .date-display { font-size:14px; color:var(--mid); margin-bottom:36px; letter-spacing:1px; }
  .input-label { font-size:11px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin-bottom:10px; text-align:left; }
  .name-input { width:100%; padding:14px 16px; background:rgba(255,255,255,0.04); border:1px solid rgba(201,169,110,0.25); border-radius:4px; color:var(--cream); font-family:'Noto Sans KR',sans-serif; font-size:20px; outline:none; text-align:center; letter-spacing:1px; transition:border-color 0.2s; margin-bottom:20px; }
  .name-input:focus { border-color:rgba(201,169,110,0.7); }
  .checkin-btn { width:100%; padding:16px; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); border:none; border-radius:4px; color:var(--dark); font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; cursor:pointer; transition:opacity 0.2s; margin-bottom:12px; }
  .checkin-btn:hover { opacity:0.85; }
  .checkout-btn { width:100%; padding:16px; background:transparent; border:1px solid rgba(201,169,110,0.3); border-radius:4px; color:var(--gold); font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:500; letter-spacing:2px; cursor:pointer; transition:all 0.2s; }
  .checkout-btn:hover { background:rgba(201,169,110,0.08); }
  .result-box { margin-top:24px; padding:20px; border-radius:6px; font-size:15px; display:none; }
  .result-box.success { background:rgba(76,175,80,0.15); border:1px solid rgba(76,175,80,0.3); color:#81C784; }
  .result-box.error { background:rgba(229,57,53,0.15); border:1px solid rgba(229,57,53,0.3); color:#EF9A9A; }
  .recent-list { margin-top:32px; text-align:left; }
  .recent-title { font-size:11px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .recent-title::after { content:''; flex:1; height:1px; background:rgba(201,169,110,0.15); }
  .recent-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px; }
  .recent-name { color:var(--cream); font-weight:500; }
  .recent-time { color:var(--mid); font-size:12px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:10px; letter-spacing:0.5px; }
  .badge.in { background:rgba(76,175,80,0.15); color:#81C784; border:1px solid rgba(76,175,80,0.3); }
  .badge.out { background:rgba(201,169,110,0.12); color:var(--gold); border:1px solid rgba(201,169,110,0.25); }
</style>
</head>

<div class="title">출석 체크</div>
<div class="subtitle">이름을 입력하고 등원 / 하원 버튼을 눌러주세요</div>
<div class="gold-line"></div>
<div class="card">
  <div class="time-display" id="timeDisplay">--:--</div>
  <div class="date-display" id="dateDisplay">--</div>
  <div class="input-label">학생 이름</div>
  <input type="text" class="name-input" id="nameInput" placeholder="홍길동" autocomplete="off">
  <button class="checkin-btn" onclick="doAttendance('in')">등원 ▶</button>
  <button class="checkout-btn" onclick="doAttendance('out')">하원 ◀</button>
  <div class="result-box" id="resultBox"></div>
  <div class="recent-list">
    <div class="recent-title">오늘 출석 현황</div>
    <div id="recentList"></div>
  </div>
</div>
<script>
const sb = supabase.createClient('https://yfgjrnhhhssimcpobepd.supabase.co','sb_publishable_zy7wXi3EUfRqNuvlWbjFyg_H4iOBxhS');

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('timeDisplay').textContent = h+':'+m;
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('dateDisplay').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
}
setInterval(updateClock,1000); updateClock();

async function doAttendance(type) {
  const name = document.getElementById('nameInput').value.trim();
  if(!name) { showResult('이름을 입력해주세요.','error'); return; }
  const now = new Date();
  const timeStr = now.toTimeString().slice(0,5);
  const dateStr = now.toISOString().split('T')[0];
  const {error} = await sb.from('attendance').insert({
    student_name: name,
    attend_date: dateStr,
    attend_time: timeStr,
    attend_type: type
  });
  if(error) { showResult('오류가 발생했습니다: '+error.message,'error'); return; }
  const msg = type==='in' ? `${name} 학생 등원 완료! (${timeStr})` : `${name} 학생 하원 완료! (${timeStr})`;
  showResult(msg,'success');
  document.getElementById('nameInput').value='';
  loadRecent();
}

function showResult(msg,type) {
  const box = document.getElementById('resultBox');
  box.textContent = msg; box.className = 'result-box '+type; box.style.display='block';
  setTimeout(()=>{ box.style.display='none'; },3000);
}

async function loadRecent() {
  const today = new Date().toISOString().split('T')[0];
  const {data} = await sb.from('attendance').select('*').eq('attend_date',today).order('attend_time',{ascending:false}).limit(20);
  const list = document.getElementById('recentList');
  if(!data||!data.length){ list.innerHTML='<div style="color:var(--mid);font-size:13px;padding:12px 0;">오늘 출석 기록이 없습니다</div>'; return; }
  list.innerHTML = data.map(r=>`
    <div class="recent-item">
      <span class="recent-name">${r.student_name}</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="recent-time">${r.attend_time}</span>
        <span class="badge ${r.attend_type==='in'?'in':'out'}">${r.attend_type==='in'?'등원':'하원'}</span>
      </div>
    </div>`).join('');
}

document.getElementById('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doAttendance('in'); });
loadRecent();
</script>
</body>
</html>
